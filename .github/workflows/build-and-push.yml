name: Build and Push Docker Image

on:
  push:
    branches: [master]
    paths: [Dockerfile]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Extract base image version
        id: meta
        run: |
          BASE_VERSION=$(grep -oP '(?<=ghcr.io/coder/coder:)[^\s]+' Dockerfile)
          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "date_tag=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/w0n9/coder:${{ steps.meta.outputs.base_version }}-${{ steps.meta.outputs.date_tag }}
            ghcr.io/w0n9/coder:latest
